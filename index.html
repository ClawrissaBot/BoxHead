<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxHead - Zombie Survival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #gameCanvas {
            border: 2px solid #333;
            background: #222;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            z-index: 10;
        }
        
        .player-stats {
            margin-bottom: 10px;
            padding: 5px;
            background: rgba(0,0,0,0.7);
            border-radius: 3px;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="1200" height="800"></canvas>
    
    <div id="ui">
        <div class="player-stats" id="player1-stats">
            <strong>Player 1</strong><br>
            Health: <span id="p1-health">100</span><br>
            Ammo: <span id="p1-ammo">30</span><br>
            Score: <span id="p1-score">0</span>
        </div>
        <div class="player-stats" id="player2-stats">
            <strong>Player 2</strong><br>
            Health: <span id="p2-health">100</span><br>
            Ammo: <span id="p2-ammo">30</span><br>
            Score: <span id="p2-score">0</span>
        </div>
    </div>
    
    <div id="controls">
        <strong>Controls:</strong><br>
        Player 1: WASD to move, Mouse to aim/shoot<br>
        Player 2: Arrow keys to move, IJKL to shoot
    </div>

    <script src="js/utils.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/input.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
